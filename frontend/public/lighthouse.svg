<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 灯塔主体 -->
  <rect x="22" y="24" width="20" height="36" rx="2" fill="#f59e0b"/>
  <!-- 灯塔顶部灯室 -->
  <rect x="16" y="14" width="32" height="14" rx="4" fill="#fbbf24"/>
  <!-- 光束 -->
  <line x1="32" y1="21" x2="6" y2="5" stroke="#fef08a" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <line x1="32" y1="21" x2="58" y2="5" stroke="#fef08a" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <!-- 灯塔底座 -->
  <rect x="18" y="54" width="28" height="6" rx="2" fill="#d97706"/>
  <!-- 塔身条纹 -->
  <rect x="22" y="32" width="20" height="4" fill="#d97706"/>
  <rect x="22" y="42" width="20" height="4" fill="#d97706"/>
  <!-- 灯芯 -->
  <circle cx="32" cy="21" r="3" fill="#fff"/>
</svg>
